<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALPACA Config Builder</title>
<link rel="icon" type="image/png" href="alpaca_face.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #fbf5e8;
    --bg-tint: #f7eeda;
    --surface: #ffffff;
    --surface-alt: #f5ead2;
    --surface-soft: #fcf4e0;
    --border: #efdeb7;
    --border-strong: #d9bc82;
    --text: #2a1f15;
    --text-dim: #6b553d;
    --text-faint: #b39c78;
    --accent: #d06a3d;
    --accent-hover: #b1532a;
    --accent-soft: #ffe6cf;
    --accent-glow: rgba(208,106,61,.12);
    --wool: #fff8eb;
    --wool-deep: #efd9a8;
    --sage: #7fa986;
    --sage-soft: #dfeadb;
    --cocoa: #6b4a2b;
    --code-bg: #2b1f12;
    --code-text: #fbefd7;
    --success: #5a8a62;
    --danger: #c0624d;
    --radius: 14px;
    --radius-sm: 10px;
    --radius-lg: 20px;
    --radius-xl: 28px;
    --shadow-sm: 0 1px 2px rgba(68,44,22,.05);
    --shadow: 0 6px 20px rgba(85,60,34,.08);
    --shadow-lg: 0 16px 38px rgba(85,60,34,.14);
    --shadow-wool: 0 4px 0 rgba(217,188,130,.35);
    --transition: .22s cubic-bezier(.34,1.4,.64,1);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background:
      radial-gradient(circle at 18% 12%, rgba(255,230,207,.55) 0, transparent 38%),
      radial-gradient(circle at 82% 86%, rgba(223,234,219,.55) 0, transparent 42%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  /* subtle wool-dot watermark behind everything */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: radial-gradient(circle, rgba(217,188,130,.22) 1px, transparent 1.6px);
    background-size: 22px 22px;
    background-position: 0 0;
    opacity: .45;
    z-index: 0;
  }
  .topbar, .progress-wrap, .stage, .nav, .preview-drawer, .toast { position: relative; z-index: 1; }

  /* ─── Top bar ─── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 28px 18px;
    background: rgba(251, 245, 232, .92);
    backdrop-filter: saturate(1.2) blur(12px);
    border-bottom: 2px dashed var(--border-strong);
  }
  /* playful wool-puff scallop under the topbar */
  .topbar::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -10px;
    height: 12px;
    background:
      radial-gradient(circle at 10px 2px, var(--border-strong) 5px, transparent 5.5px) repeat-x;
    background-size: 20px 12px;
    opacity: .45;
    pointer-events: none;
  }
  .topbar-brand { display: flex; align-items: center; gap: 14px; flex: 1; }
  .topbar-brand img {
    height: 48px; width: auto;
    transform: rotate(-4deg);
    transition: transform var(--transition);
    filter: drop-shadow(0 2px 0 rgba(208,106,61,.18));
  }
  .topbar-brand:hover img { transform: rotate(4deg) scale(1.06); }
  .topbar-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px; font-weight: 600; letter-spacing: -.01em;
    color: var(--cocoa);
    line-height: 1.05;
  }
  .topbar-title small {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 11.5px; font-weight: 500;
    color: var(--text-dim); margin-top: 3px;
    letter-spacing: .01em;
  }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }

  /* ─── Buttons ─── */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px; border-radius: 999px;
    font: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; border: 1.5px solid transparent;
    transition: transform var(--transition), background var(--transition),
                color var(--transition), border-color var(--transition),
                box-shadow var(--transition);
    background: transparent;
    color: var(--text); line-height: 1;
  }
  .btn:hover { background: var(--surface-alt); transform: translateY(-1px); }
  .btn:active { transform: translateY(1px) scale(.98); }
  .btn-ghost { color: var(--text-dim); }
  .btn-outline { border-color: var(--border-strong); background: var(--surface); }
  .btn-outline:hover { background: var(--surface-alt); border-color: var(--accent); color: var(--accent); }
  .btn-primary {
    background: var(--accent); color: #fff; border-color: var(--accent);
    box-shadow: 0 3px 0 rgba(140,55,20,.35), 0 6px 14px rgba(208,106,61,.28);
  }
  .btn-primary:hover {
    background: var(--accent-hover); border-color: var(--accent-hover);
    box-shadow: 0 4px 0 rgba(140,55,20,.4), 0 8px 18px rgba(208,106,61,.34);
  }
  .btn-primary:active {
    box-shadow: 0 1px 0 rgba(140,55,20,.3), 0 2px 6px rgba(208,106,61,.22);
  }
  .btn-primary:disabled {
    background: var(--border-strong); border-color: var(--border-strong);
    cursor: not-allowed; box-shadow: none;
    color: #fff;
  }
  .btn-danger:hover { color: var(--danger); background: rgba(192,98,77,.08); }
  .btn .icon { width: 14px; height: 14px; flex-shrink: 0; }

  /* ─── Progress bar ─── */
  .progress-wrap {
    background: var(--wool);
    border-bottom: 1px solid var(--border);
    padding: 22px 28px 16px;
    box-shadow: inset 0 -1px 0 rgba(255,255,255,.6);
  }
  .progress-track {
    max-width: 880px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .progress-step {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    min-width: 0;
  }
  .progress-step .dot {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--text-faint);
    transition: all var(--transition);
    flex-shrink: 0;
    box-shadow: 0 2px 0 rgba(217,188,130,.35), inset 0 -2px 0 rgba(217,188,130,.22);
  }
  .progress-step:hover .dot { transform: translateY(-1px) rotate(-4deg); }
  .progress-step .lbl {
    font-size: 11px; font-weight: 500;
    color: var(--text-faint);
    text-align: center;
    line-height: 1.3;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: color var(--transition);
  }
  .progress-step.done .dot {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 2px 0 rgba(208,106,61,.28), inset 0 -2px 0 rgba(208,106,61,.14);
  }
  .progress-step.active .dot {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 0 5px var(--accent-glow), 0 3px 0 rgba(140,55,20,.3);
    transform: scale(1.12);
    animation: bob 2.4s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: scale(1.12) translateY(0); }
    50% { transform: scale(1.12) translateY(-2px); }
  }
  .progress-step.active .lbl {
    color: var(--accent);
    font-weight: 700;
  }
  .progress-step.done:hover .lbl { color: var(--text); }
  .progress-step.upcoming { cursor: not-allowed; }
  .progress-line {
    flex: 0 0 24px;
    height: 2px;
    background: repeating-linear-gradient(to right,
      var(--border-strong) 0 3px, transparent 3px 7px);
    margin-bottom: 26px;
    transition: background var(--transition);
    border-radius: 2px;
  }
  .progress-line.done {
    background: var(--accent);
  }

  /* ─── Layout ─── */
  .stage {
    max-width: 780px;
    margin: 0 auto;
    padding: 36px 28px 160px;
  }

  .step-hero {
    position: relative;
    display: flex;
    gap: 18px;
    align-items: flex-start;
    margin-bottom: 28px;
    padding-right: 80px;
  }
  /* alpaca mascot watermark peeking from the hero */
  .step-hero::after {
    content: '';
    position: absolute;
    right: -6px; top: -10px;
    width: 74px; height: 74px;
    background: url('alpaca_face.png') center / contain no-repeat;
    opacity: .85;
    transform: rotate(6deg);
    transition: transform var(--transition);
    pointer-events: none;
    filter: drop-shadow(0 3px 0 rgba(217,188,130,.45));
  }
  .step-hero:hover::after { transform: rotate(-8deg) scale(1.06); }
  .step-hero-mark {
    flex-shrink: 0;
    width: 52px; height: 52px;
    border-radius: 18px 18px 14px 14px / 22px 22px 14px 14px;
    background:
      radial-gradient(circle at 35% 35%, #ffffff 0 30%, transparent 31%),
      var(--accent-soft);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px; font-weight: 700;
    box-shadow: 0 3px 0 rgba(208,106,61,.25), inset 0 -2px 0 rgba(208,106,61,.12);
    transform: rotate(-3deg);
    transition: transform var(--transition);
  }
  .step-hero-mark:hover { transform: rotate(4deg) scale(1.05); }
  .step-hero-text { flex: 1; min-width: 0; }
  .step-eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: .12em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 4px;
  }
  .step-eyebrow::before {
    content: '✦ ';
    color: var(--sage);
  }
  .step-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 30px; font-weight: 600;
    letter-spacing: -.015em; line-height: 1.15;
    color: var(--cocoa);
    margin-bottom: 8px;
  }
  .step-intro {
    color: var(--text-dim);
    font-size: 14.5px;
    line-height: 1.6;
  }

  .step-fade {
    animation: fadeUp .35s cubic-bezier(.34,1.4,.64,1);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── Card ─── */
  .card {
    position: relative;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-sm), 0 2px 0 rgba(217,188,130,.18);
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .card:hover {
    border-color: var(--border-strong);
    box-shadow: var(--shadow), 0 3px 0 rgba(217,188,130,.3);
  }
  .card-title {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px; font-weight: 600;
    color: var(--cocoa); margin-bottom: 4px;
    letter-spacing: -.005em;
  }
  .card-desc { font-size: 12.5px; color: var(--text-dim); margin-bottom: 14px; }

  /* Advanced disclosure */
  details.advanced {
    background: var(--surface-soft);
    border: 2px dashed var(--border-strong);
    border-radius: var(--radius-lg);
    margin-top: 20px;
    padding: 0;
    transition: background var(--transition), border-color var(--transition);
  }
  details.advanced[open] {
    padding-bottom: 14px;
    background: var(--wool);
    border-color: var(--accent);
  }
  details.advanced > summary {
    list-style: none;
    padding: 14px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    user-select: none;
    font-family: 'Fraunces', Georgia, serif;
    letter-spacing: -.005em;
  }
  details.advanced > summary::-webkit-details-marker { display: none; }
  details.advanced > summary::before {
    content: '';
    width: 9px; height: 9px;
    border-right: 2px solid var(--text-dim);
    border-bottom: 2px solid var(--text-dim);
    transform: rotate(-45deg);
    transition: transform var(--transition), border-color var(--transition);
    margin-left: 2px;
  }
  details.advanced[open] > summary::before {
    transform: rotate(45deg);
    border-color: var(--accent);
  }
  details.advanced[open] > summary { color: var(--accent); }
  details.advanced > summary:hover { color: var(--cocoa); }
  details.advanced .advanced-body {
    padding: 0 20px 4px;
  }
  details.advanced .card {
    border: 1.5px solid var(--border);
    background: var(--surface);
    box-shadow: var(--shadow-sm);
  }

  /* ─── Field grid ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px 16px;
  }
  .grid-1 { grid-template-columns: 1fr; }
  .grid > .span-2 { grid-column: span 2; }

  .field { min-width: 0; }
  .field-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 12.5px; font-weight: 600;
    color: var(--cocoa); margin-bottom: 6px;
  }
  .field-control { display: flex; align-items: stretch; gap: 6px; }

  /* ─── Inputs ─── */
  input[type="text"], input[type="number"], select, textarea {
    width: 100%;
    padding: 9px 12px;
    background: var(--surface);
    border: 1.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    color: var(--text);
    font: inherit; font-size: 13px;
    transition: border-color var(--transition), box-shadow var(--transition),
                background var(--transition);
    outline: none;
  }
  input:hover:not(:disabled), select:hover:not(:disabled), textarea:hover:not(:disabled) {
    border-color: var(--accent);
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-glow);
    background: var(--wool);
  }
  input::placeholder, textarea::placeholder { color: var(--text-faint); font-style: italic; }
  input:disabled, select:disabled, textarea:disabled {
    background: var(--surface-alt);
    color: var(--text-faint);
    cursor: not-allowed;
  }
  textarea {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12px;
    resize: vertical;
    min-height: 80px;
  }
  select {
    appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8'><path fill='%23d06a3d' d='M6 8L0 0h12z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
    background-size: 10px;
    padding-right: 32px;
  }
  .tuple { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* ─── Toggle switch (wool puff) ─── */
  .toggle {
    position: relative;
    display: inline-flex;
    width: 42px; height: 24px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider {
    position: absolute; inset: 0;
    background: var(--border-strong);
    border-radius: 999px;
    transition: background var(--transition);
    box-shadow: inset 0 1px 2px rgba(68,44,22,.15);
  }
  .toggle .slider::before {
    content: '';
    position: absolute; top: 2px; left: 2px;
    width: 20px; height: 20px;
    background:
      radial-gradient(circle at 30% 30%, #ffffff 0 40%, #f5ead2 100%);
    border-radius: 50%;
    transition: transform var(--transition);
    box-shadow: 0 2px 3px rgba(0,0,0,.22), inset 0 -1px 2px rgba(217,188,130,.4);
  }
  .toggle input:checked + .slider { background: var(--accent); }
  .toggle input:checked + .slider::before { transform: translateX(18px); }

  .toggle-row {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 16px; padding: 8px 0;
  }
  .toggle-row .toggle-info { flex: 1; min-width: 0; }
  .toggle-row .field-label { margin-bottom: 0; }
  .toggle-row + .toggle-row { border-top: 1px dashed var(--border); padding-top: 14px; margin-top: 4px; }

  /* ─── Picker (radio cards): wool-pouch style ─── */
  .picker {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
  }
  .pick {
    position: relative;
    background: var(--surface);
    border: 2px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: transform var(--transition), border-color var(--transition),
                background var(--transition), box-shadow var(--transition);
    box-shadow: 0 2px 0 rgba(217,188,130,.22);
  }
  .pick:hover {
    border-color: var(--accent);
    background: var(--wool);
    transform: translateY(-2px);
    box-shadow: 0 4px 0 rgba(208,106,61,.18), 0 8px 18px rgba(208,106,61,.12);
  }
  .pick.on {
    border-color: var(--accent);
    background: var(--accent-soft);
    box-shadow: 0 3px 0 rgba(208,106,61,.3), 0 0 0 3px var(--accent-glow);
  }
  .pick.on::after {
    content: '✓';
    position: absolute;
    top: 10px; right: 12px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    box-shadow: 0 2px 0 rgba(140,55,20,.3);
  }
  /* phase cards already have their own toggle at the top-right */
  .pick:has(.toggle)::after { display: none !important; }
  .pick:has(.toggle) .pick-title { padding-right: 0; }
  .pick-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px; font-weight: 600;
    color: var(--cocoa); margin-bottom: 4px;
    padding-right: 24px;
    letter-spacing: -.005em;
  }
  .pick-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; }
  .pick input { display: none; }

  /* ─── Auto inline pill ─── */
  .inline-toggle {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 0 12px;
    background: var(--surface-alt);
    border: 1.5px solid var(--border-strong);
    border-radius: 999px;
    cursor: pointer;
    font-size: 11px; font-weight: 600;
    color: var(--text-dim);
    user-select: none;
    flex-shrink: 0;
    transition: all var(--transition);
    letter-spacing: .02em;
  }
  .inline-toggle:hover { transform: translateY(-1px); }
  .inline-toggle.on {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  .inline-toggle input { display: none; }

  /* ─── Tooltip (the ? icon) ─── */
  .tip {
    position: relative;
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--surface-alt);
    border: 1.5px solid var(--border-strong);
    color: var(--text-faint);
    font-size: 10px; font-weight: 700;
    cursor: help;
    flex-shrink: 0;
    transition: all var(--transition);
  }
  .tip:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    transform: scale(1.15);
  }
  .tip::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%);
    width: max-content;
    max-width: 320px;
    padding: 10px 13px;
    background: var(--cocoa);
    color: var(--wool);
    font-size: 11.5px;
    font-weight: 400;
    line-height: 1.5;
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg);
    white-space: normal;
    text-align: left;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition);
    z-index: 100;
  }
  .tip::before {
    content: '';
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: var(--cocoa);
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition);
    z-index: 100;
  }
  .tip:hover::after, .tip:hover::before { opacity: 1; }

  /* ─── Bottom nav ─── */
  .nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 16px 28px 22px;
    background: linear-gradient(180deg, rgba(251,245,232,0) 0%, var(--bg) 45%);
    z-index: 60;
    display: flex;
    justify-content: center;
    pointer-events: none;
  }
  .nav-inner {
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 2px solid var(--border-strong);
    border-radius: 999px;
    padding: 6px;
    box-shadow: var(--shadow-lg), 0 3px 0 rgba(217,188,130,.35);
  }
  .nav-inner .step-counter {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 13px; font-weight: 600;
    color: var(--cocoa);
    padding: 0 14px;
    min-width: 82px;
    text-align: center;
    letter-spacing: .01em;
  }
  .nav .btn { border-radius: 999px; padding: 10px 20px; }

  /* ─── JSON Preview drawer ─── */
  .preview-drawer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--wool);
    border-top: 2px dashed var(--border-strong);
    box-shadow: 0 -6px 24px rgba(85,60,34,.1);
    z-index: 55;
    transform: translateY(calc(100% - 42px));
    transition: transform var(--transition);
  }
  .preview-drawer.open { transform: translateY(0); }
  .preview-handle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 24px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
  }
  .preview-handle .label {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 12px; font-weight: 600; color: var(--cocoa);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .preview-handle:hover .label { color: var(--accent); }
  .preview-handle .chevron {
    width: 14px; height: 14px;
    transition: transform var(--transition);
    color: var(--text-dim);
  }
  .preview-drawer.open .chevron { transform: rotate(180deg); }
  .preview-body {
    max-height: 50vh;
    overflow: auto;
    padding: 16px 24px 24px;
  }
  .json-preview {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12px;
    line-height: 1.65;
    white-space: pre;
    background: var(--code-bg);
    color: var(--code-text);
    padding: 18px 20px;
    border-radius: var(--radius);
    border: 2px solid var(--cocoa);
    box-shadow: inset 0 0 0 2px rgba(217,188,130,.15);
  }
  .json-preview .key { color: #ffcc7a; }
  .json-preview .string { color: #b8d59a; }
  .json-preview .number { color: #e6b565; }
  .json-preview .bool { color: #8fc8d6; }
  .json-preview .null { color: #d4948c; font-style: italic; }

  /* ─── Review step summary ─── */
  .summary {
    position: relative;
    background: var(--wool);
    border: 2px solid var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    margin-bottom: 18px;
    box-shadow: 0 3px 0 rgba(217,188,130,.35);
  }
  .summary-row {
    display: flex; gap: 14px;
    padding: 10px 0;
    border-bottom: 1px dashed var(--border-strong);
    font-size: 13px;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-key {
    flex: 0 0 180px;
    color: var(--text-dim);
    font-weight: 600;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 13px;
  }
  .summary-val {
    flex: 1;
    color: var(--cocoa);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    font-weight: 500;
  }

  /* ─── Tutorial step blocks ─── */
  .tut-step {
    display: flex;
    gap: 14px;
    padding: 16px 0;
    border-top: 1px dashed var(--border-strong);
  }
  .tut-step:first-child { border-top: none; padding-top: 4px; }
  .tut-num {
    flex: 0 0 32px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px; font-weight: 700;
    box-shadow: 0 3px 0 rgba(140,55,20,.3);
  }
  .tut-body { flex: 1; min-width: 0; }
  .tut-body h4 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px; font-weight: 600;
    margin-bottom: 6px;
    color: var(--cocoa);
    letter-spacing: -.005em;
  }
  .tut-body p { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; line-height: 1.6; }
  .codeblock {
    position: relative;
    background: var(--code-bg);
    color: var(--code-text);
    padding: 14px 16px;
    border-radius: var(--radius);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12px;
    line-height: 1.6;
    overflow-x: auto;
    margin: 8px 0 0;
    white-space: pre;
    border: 2px solid var(--cocoa);
    box-shadow: 0 3px 0 rgba(68,44,22,.35);
  }
  .codeblock .copy {
    position: absolute;
    top: 8px; right: 8px;
    padding: 4px 10px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.14);
    color: var(--code-text);
    border-radius: 999px;
    font-size: 10.5px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    cursor: pointer;
    opacity: .75;
    transition: opacity var(--transition), background var(--transition);
  }
  .codeblock:hover .copy { opacity: 1; }
  .codeblock .copy:hover { background: rgba(255,255,255,.18); }
  .codeblock .c-key  { color: #ffcc7a; }
  .codeblock .c-str  { color: #b8d59a; }
  .codeblock .c-num  { color: #e6b565; }
  .codeblock .c-com  { color: #9a8d74; font-style: italic; }
  .codeblock .c-kw   { color: #d4a4d4; }

  /* file input hidden */
  #fileInput { display: none; }

  /* toast */
  .toast {
    position: fixed; top: 24px; right: 28px;
    padding: 12px 18px;
    background: var(--cocoa);
    color: var(--wool);
    border-radius: 999px;
    font-size: 13px; font-weight: 600;
    box-shadow: var(--shadow-lg), 0 3px 0 rgba(68,44,22,.3);
    opacity: 0;
    transform: translateY(-10px);
    pointer-events: none;
    transition: all var(--transition);
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: var(--danger); box-shadow: var(--shadow-lg), 0 3px 0 rgba(130,60,45,.35); }
  .toast.success { background: var(--success); box-shadow: var(--shadow-lg), 0 3px 0 rgba(54,92,62,.35); }

  .muted { color: var(--text-dim); font-size: 12px; }

  /* tiny wool-tuft divider */
  .wool-divider {
    height: 12px;
    background: radial-gradient(circle at 8px 6px, var(--border-strong) 4px, transparent 4.5px) repeat-x;
    background-size: 16px 12px;
    opacity: .5;
    margin: 4px 0 2px;
  }

  /* responsive */
  @media (max-width: 720px) {
    .stage { padding: 24px 16px 160px; }
    .grid { grid-template-columns: 1fr; }
    .progress-track { gap: 2px; }
    .progress-step .lbl { display: none; }
    .progress-line { flex: 1; margin-bottom: 0; }
    .topbar { padding: 12px 16px 16px; }
    .topbar-title { font-size: 18px; }
    .topbar-title small { display: none; }
    .topbar-brand img { height: 40px; }
    .progress-wrap { padding: 16px 16px 12px; }
    .nav-inner .step-counter { min-width: 60px; }
    .step-hero { padding-right: 0; }
    .step-hero::after { width: 56px; height: 56px; right: -4px; top: -4px; opacity: .7; }
    .step-title { font-size: 24px; }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 5px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <img src="alpaca_orbit.png" alt="ALPACA" onerror="this.onerror=null;this.src='alpaca_logo.png'">
    <div class="topbar-title">
      ALPACA Config Builder
      <small>a cozy, guided wizard for your <code style="font-family:'JetBrains Mono',monospace;font-size:10px">config.json</code></small>
    </div>
  </div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="document.getElementById('fileInput').click()" title="Load existing config.json">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Load
    </button>
    <input type="file" id="fileInput" accept=".json,application/json">
    <button class="btn btn-ghost btn-danger" onclick="resetDefaults()" title="Reset all fields to schema defaults">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      Reset
    </button>
    <button class="btn btn-primary" onclick="downloadConfig()">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download
    </button>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-track" id="progress"></div>
</div>

<main class="stage" id="stage"></main>

<div class="nav">
  <div class="nav-inner">
    <button class="btn btn-ghost" id="navBack">← Back</button>
    <div class="step-counter" id="stepCounter"></div>
    <button class="btn btn-primary" id="navNext">Next →</button>
  </div>
</div>

<div class="preview-drawer" id="previewDrawer">
  <div class="preview-handle" onclick="togglePreview()">
    <div class="label">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      Live JSON preview
    </div>
    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
  </div>
  <div class="preview-body">
    <pre class="json-preview" id="jsonPreview"></pre>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================================
   FIELD DEFINITIONS: every key from alpaca/config.py with docstring tooltip
   ========================================================================= */
/* Each entry: full-dotted-path → { type, default, label, tip, options?, placeholder? } */

const F = {
  /*:pipeline top-level:*/
  "output_dir":               { type:"string",  default:"pipeline_output", label:"Output directory",
                                tip:"Directory where all pipeline outputs (PSF, multistart results, posterior samples, plots) are written." },
  "random_seed":              { type:"int",     default:42, label:"Random seed",
                                tip:"Master RNG seed inherited by all stages, fixes reproducibility for multistart inits, sampler chains, and plotting." },
  "verbose":                  { type:"bool",    default:true, label:"Verbose logging",
                                tip:"Print detailed progress, timing, and per-stage diagnostics during the pipeline run." },
  "run_psf":                  { type:"bool",    default:true, label:"Run PSF reconstruction",
                                tip:"Execute the iterative STARRED PSF reconstruction stage. Disable if you already have a trusted PSF.",
                                rich:{ desc:"Iteratively refine the PSF kernel from the point sources in your image (STARRED)." } },
  "run_multistart":           { type:"bool",    default:true, label:"Run multistart MAP",
                                tip:"Execute the two-phase gradient-descent multistart MAP optimisation that seeds the sampler.",
                                rich:{ desc:"Two-phase Adam + L-BFGS multistart MAP optimisation that finds a good seed for sampling." } },
  "run_sampling":             { type:"bool",    default:true, label:"Run posterior sampling",
                                tip:"Execute the posterior sampling stage (NUTS / Nautilus / NIFTy).",
                                rich:{ desc:"Bayesian posterior sampling: NUTS, Nautilus, or NIFTy depending on your model." } },
  "resume_from_previous":     { type:"bool",    default:false, label:"Load a previous multistart result",
                                tip:"Multistart-only: when multistart is skipped, try to load a prior multistart_summary.npz to seed sampling. Does not resume PSF or sampling phases: those always rerun when enabled." },
  "resume_multistart_path":   { type:"nullable_string", default:null, label:"Prior multistart_summary.npz path",
                                placeholder:"leave empty to look in output_dir/multistart/",
                                tip:"Explicit path to a previous multistart_summary.npz. Empty = default to the current output_dir's multistart folder." },

  /*:data:*/
  "data.pix_scale":           { type:"float",   default:0.08, label:"Pixel scale (arcsec/pix)",
                                tip:"Detector pixel scale in arcsec/pixel." },
  "data.source_oversample":   { type:"int",     default:3, label:"Source oversample",
                                tip:"Source-plane supersampling factor. The source grid is N× finer than data pixels and is downsampled on output. Memory scales ~quadratically." },
  "data.psf_oversample":      { type:"int",     default:1, label:"PSF oversample",
                                tip:"Supersampling factor of the INPUT PSF relative to the data pixel grid. 1 = data resolution; >1 keeps the PSF at its native finer resolution through the forward model (e.g. JWST PSFs at 5× → set to 5)." },
  "data.likelihood_mask_path":{ type:"nullable_string", default:null, label:"Likelihood mask path",
                                placeholder:"leave empty for none, or /path/to/mask.npy",
                                tip:"Optional boolean mask (.npy or .fits). When provided, only True pixels contribute to the likelihood. Empty = use all pixels." },
  "data.ps_min_sep":          { type:"float",   default:0.18, label:"PS min separation (arcsec)",
                                tip:"Minimum separation in arcsec between detected point-source images." },
  "data.ps_fallback_to_truth":{ type:"bool",    default:true, label:"Fallback to truth positions",
                                tip:"Fall back to truth positions if point-source detection fails. Useful for synthetic data where truth is known." },

  /*:model:*/
  "model.source_type":        { type:"picker",  default:"shapelets",
                                options:[
                                  { value:"shapelets",  title:"Shapelets",         desc:"Smooth basis-function expansion. Compact parameter count; good for relatively smooth sources." },
                                  { value:"corr_field", title:"Correlated field",  desc:"Pixelated source with a Gaussian-process prior (NIFTy). More flexible but heavier." },
                                ],
                                label:"Source representation",
                                tip:"Source light representation. Shapelets use a basis expansion; Correlated Fields use a pixelated GP-prior source." },
  "model.shapelets_n_max":    { type:"int",     default:6, label:"Shapelets n_max",
                                tip:"Maximum shapelet order. Number of basis functions grows quadratically with n_max." },
  "model.corr_field_for_sampling_only":
                              { type:"bool",    default:false, label:"Corr-field for sampling only",
                                tip:"Two-stage mode: shapelets for gradient descent, correlated fields for sampling. Only valid when source_type = corr_field." },
  "model.use_double_sersic_lens":
                              { type:"bool",    default:false, label:"Double-Sersic lens light",
                                tip:"Use two Sersic profiles (bulge + disk) for the lens light instead of one." },

  /*:model.corr_field:*/
  "model.corr_field.num_pixels":         { type:"int",     default:80, label:"Source pixels per side",
                                            tip:"Number of pixels per side for the correlated-field source grid." },
  "model.corr_field.mean_intensity":     { type:"nullable_float", default:null, label:"Mean intensity (log-space)",
                                            placeholder:"leave empty to estimate from data",
                                            tip:"Log-space mean intensity. Empty = estimate from data." },
  "model.corr_field.offset_std":         { type:"tuple2", default:[0.5, 0.001], label:"offset_std (mean, std)",
                                            tip:"GP prior on the field offset:(mean, std) of the log-normal hyperparameter." },
  "model.corr_field.loglogavgslope":     { type:"tuple2", default:[-6.0, 0.5], label:"loglogavgslope (mean, std)",
                                            tip:"GP power-spectrum slope hyperparameter (mean, std). More negative mean = smoother source." },
  "model.corr_field.fluctuations":       { type:"tuple2", default:[1.0, 0.5], label:"fluctuations (mean, std)",
                                            tip:"GP fluctuation amplitude hyperparameter (mean, std). Controls how strong the structure can be." },
  "model.corr_field.flexibility":        { type:"nullable_tuple2", default:null, label:"flexibility prior",
                                            offLabel:"no flexibility prior",
                                            tip:"Optional spectral prior on power-spectrum flexibility. Toggle off = disabled." },
  "model.corr_field.asperity":           { type:"nullable_tuple2", default:null, label:"asperity prior",
                                            offLabel:"no asperity prior",
                                            tip:"Optional spectral prior on power-spectrum asperity (small-scale roughness). Toggle off = disabled." },
  "model.corr_field.cropped_border_size":{ type:"int", default:20, label:"Cropped border (pix)",
                                            tip:"Border pixels cropped from the source field to mitigate FFT edge effects." },
  "model.corr_field.exponentiate":       { type:"bool", default:true, label:"Exponentiate field",
                                            tip:"Exponentiate the GP field so the source stays positive." },
  "model.corr_field.interpolation_type": { type:"enum", default:"fast_bilinear", options:["fast_bilinear","bilinear","bicubic"], label:"Interpolation",
                                            tip:"Interpolation method for source-pixel → image-plane mapping." },
  "model.corr_field.adaptive_grid":      { type:"bool", default:true, label:"Adaptive grid",
                                            tip:"Adapt the source grid extent to the arc mask so resolution is concentrated where the source is." },

  /*:model.corr_field.arc_mask:*/
  "model.corr_field.arc_mask.mode":      { type:"picker", default:"auto",
                                            options:[
                                              { value:"auto",   title:"Auto",   desc:"Circular annulus computed from the point-source positions." },
                                              { value:"signal", title:"Signal", desc:"Mask derived from gradient-descent residuals (where the arc shows up)." },
                                              { value:"custom", title:"Custom", desc:"Load an external mask file (FITS or .npy)." },
                                            ],
                                            label:"Arc-mask mode",
                                            tip:"How to define the region where the source can live in the image plane." },
  "model.corr_field.arc_mask.inner_radius":{ type:"auto_or_float", default:0.3, label:"Inner radius (arcsec)",
                                              tip:"Inner radius (arcsec) masking the lens centre. 'auto' computes from PS positions." },
  "model.corr_field.arc_mask.outer_radius":{ type:"auto_or_float", default:2.5, label:"Outer radius (arcsec)",
                                              tip:"Outer radius (arcsec) for the source region. 'auto' computes from PS positions." },
  "model.corr_field.arc_mask.custom_path": { type:"nullable_string", default:null, label:"Custom mask path",
                                              placeholder:"/path/to/mask.fits",
                                              tip:"Path to a custom mask (FITS or .npy) when mode = custom." },
  "model.corr_field.arc_mask.signal_threshold":  { type:"float", default:3.0, label:"Signal SNR threshold",
                                                    tip:"SNR threshold for arc detection (signal mode only)." },
  "model.corr_field.arc_mask.signal_dilate_pix": { type:"int",   default:2,   label:"Signal dilate (pix)",
                                                    tip:"Morphological dilation radius in pixels (signal mode)." },
  "model.corr_field.arc_mask.signal_inner_factor":{ type:"float", default:0.0, label:"Signal inner factor",
                                                    tip:"Inner radius = factor × r_min_ps. Smaller = let the signal decide where the inner cut is." },
  "model.corr_field.arc_mask.signal_min_area":   { type:"int",   default:50,  label:"Signal min area (pix)",
                                                    tip:"Minimum connected-component area in pixels (signal mode)." },

  /*:likelihood:*/
  "likelihood.use_time_delays": { type:"bool", default:false, label:"Use time delays",
                                  tip:"Include the time-delay likelihood term." },
  "likelihood.use_rayshoot_consistency": { type:"bool", default:false, label:"Use ray-shoot consistency",
                                          tip:"Add a penalty for scatter in ray-traced source positions across the multiple images." },
  "likelihood.rayshoot_sigma":  { type:"float", default:0.0002, label:"Ray-shoot sigma (arcsec)",
                                  tip:"Astrometric uncertainty floor in arcsec for the ray-shooting term." },
  "likelihood.rayshoot_against_source_pos": { type:"bool", default:true, label:"Compare to source position",
                                  tip:"If true, compare ray-traced positions to the sampled source position; if false, compare to their mean." },
  "likelihood.use_rayshoot_sys_error": { type:"bool", default:false, label:"Sample rayshoot sys-error",
                                  tip:"Sample a free systematic-error parameter for the ray-shooting term." },
  "likelihood.rayshoot_sys_error_range":{ type:"tuple2", default:[5e-5, 5e-3], label:"Sys-error range (min, max)",
                                  tip:"(min, max) range in arcsec for the systematic-error parameter." },
  "likelihood.use_image_pos_offsets": { type:"bool", default:false, label:"Use image-pos offsets",
                                  tip:"Add per-image position offsets (TD + rayshoot terms only)." },
  "likelihood.image_pos_offset_sigma":{ type:"float", default:0.01, label:"Image-pos offset sigma (arcsec)",
                                  tip:"Prior sigma on per-image position offsets in arcsec." },

  "likelihood.noise_model.noise_boost":   { type:"bool", default:true, label:"Boost noise around point sources",
                                            tip:"Boost the noise map around detected point sources so they don't dominate the extended-source fit." },
  "likelihood.noise_model.use_psf_error_map":{ type:"bool", default:false, label:"PSF error map",
                                            tip:"Add a per-pixel variance term that scales with point-source flux: σ²_eff = σ² + b² · ps_image², with b sampled." },
  "likelihood.noise_model.noise_boost_kwargs.f_max":       { type:"float", default:5.0, label:"f_max",
                                                              tip:"Maximum boost factor applied at the centre of each point source." },
  "likelihood.noise_model.noise_boost_kwargs.radius":      { type:"nullable_float", default:null, label:"radius (pix)",
                                                              placeholder:"auto from frac_min_sep",
                                                              tip:"Boost radius in pixels. Empty = compute automatically from frac_min_sep." },
  "likelihood.noise_model.noise_boost_kwargs.frac_min_sep":{ type:"float", default:0.4, label:"frac_min_sep",
                                                              tip:"Auto-radius is this fraction of the minimum PS separation." },
  "likelihood.noise_model.noise_boost_kwargs.min_npix":    { type:"float", default:2.5, label:"min_npix",
                                                              tip:"Lower clamp on the auto-computed boost radius (pixels)." },
  "likelihood.noise_model.noise_boost_kwargs.max_npix":    { type:"float", default:6.0, label:"max_npix",
                                                              tip:"Upper clamp on the auto-computed boost radius (pixels)." },

  /*:psf:*/
  "psf.n_iterations":            { type:"int", default:3, label:"Iterations",
                                    tip:"Number of iterative PSF refinement passes." },
  "psf.n_starts_per_iteration":  { type:"int", default:10, label:"Starts per iteration",
                                    tip:"Random starts for the multi-start optimisation per iteration." },
  "psf.starred_oversample":      { type:"int", default:3, label:"STARRED oversample",
                                    tip:"Supersampling factor inside STARRED for sub-pixel PSF reconstruction." },
  "psf.mask_other_peaks":        { type:"bool", default:true, label:"Mask other peaks",
                                    tip:"Mask other detected point-source peaks when reconstructing each PS." },
  "psf.mask_radius_pix":         { type:"int", default:8, label:"Mask radius (pix)",
                                    tip:"Radius in pixels of the mask placed around other peaks." },
  "psf.rotation_mode":           { type:"enum", default:"none", options:["none","90","all"], label:"Rotation augmentation",
                                    tip:"Rotation augmentation mode for STARRED. 'none' = no rotation; '90' = 4-fold; 'all' = all integer-degree rotations." },
  "psf.negative_sigma_clip":     { type:"nullable_float", default:null, label:"Negative sigma clip",
                                    placeholder:"no clipping",
                                    tip:"Clip pixels below −clip · σ in the reconstructed PSF. Empty = no clipping." },
  "psf.parallelized":            { type:"bool", default:true, label:"Parallelised",
                                    tip:"Parallelise multi-start evaluations across available devices." },

  /*:gd:*/
  "gd.n_starts_initial":         { type:"int", default:50, label:"Initial starts",
                                    tip:"Phase-1 random starts." },
  "gd.adam_steps_initial":       { type:"int", default:500, label:"Adam steps (init)",
                                    tip:"Phase-1 Adam optimisation steps per start." },
  "gd.lbfgs_maxiter_initial":    { type:"int", default:600, label:"L-BFGS maxiter (init)",
                                    tip:"Phase-1 L-BFGS iterations per start." },
  "gd.n_top_for_refinement":     { type:"int", default:5, label:"Top-N for refinement",
                                    tip:"Number of best Phase-1 results carried into Phase-2." },
  "gd.n_perturbations_per_top":  { type:"int", default:10, label:"Perturbations per top",
                                    tip:"Number of perturbations per top result in Phase-2." },
  "gd.phase2_perturbation_scale":{ type:"float", default:0.1, label:"Perturbation scale",
                                    tip:"Gaussian σ used to perturb the top Phase-1 parameter sets in Phase-2." },

    nuts: { n_warmup: 3000, n_samples: 5000 },
    nifty_vi: { n_iterations: 30, n_samples_per_iteration: 32, cg_maxiter: 100, n_resample: 500 },
    nifty_nuts: { n_warmup: 300, n_samples: 1000 },
  },
  plotting: {
    corner_params: ["lens_theta_E","lens_gamma","lens_e1","lens_e2","lens_gamma1","lens_gamma2","lens_center_x","lens_center_y","D_dt"],
  },
};

/* =========================================================================
   STATE
   ========================================================================= */

function getDefaults() {
  const d = {};
  for (const path in F) setPath(d, path, deepClone(F[path].default));
  deepMerge(d, deepClone(PRESET));
  return d;
}

function deepClone(x) {
  if (x === null || typeof x !== "object") return x;
  if (Array.isArray(x)) return x.map(deepClone);
  const o = {};
  for (const k in x) o[k] = deepClone(x[k]);
  return o;
}

function getPath(obj, path) {
  const parts = path.split(".");
  let cur = obj;
  for (const p of parts) { if (cur == null) return undefined; cur = cur[p]; }
  return cur;
}

function setPath(obj, path, val) {
  const parts = path.split(".");
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    if (cur[parts[i]] == null || typeof cur[parts[i]] !== "object") cur[parts[i]] = {};
    cur = cur[parts[i]];
  }
  cur[parts[parts.length - 1]] = val;
}

let STATE = getDefaults();
let CURRENT_STEP = 0;

/* =========================================================================
   FIELD RENDERERS: same set of types as before
   ========================================================================= */

function tip(text) {
  if (!text) return "";
  const safe = String(text).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
  return `<span class="tip" data-tip="${safe}">?</span>`;
}
function escapeAttr(v) {
  if (v == null) return "";
  return String(v).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
}
function fmtNum(n) {
  if (n === null || n === undefined || n === "") return "";
  if (typeof n === "number") {
    if (n !== 0 && (Math.abs(n) < 1e-3 || Math.abs(n) >= 1e6)) return n.toExponential();
    return String(n);
  }
  return String(n);
}
function parseNum(v) {
  if (v === "" || v === null || v === undefined) return null;
  const n = Number(v);
  return isFinite(n) ? n : null;
}

function renderField(path, override) {
  const f = { ...F[path], ...(override || {}) };
  const cur = getPath(STATE, path);
  const span = f.span === 2 ? "span-2" : "";
  const labelHtml = `<div class="field-label">${escapeAttr(f.label)} ${tip(f.tip)}</div>`;
  const wrap = (inner) => `<div class="field ${span}">${labelHtml}<div class="field-control">${inner}</div></div>`;

  switch (f.type) {
    case "string":
      return wrap(`<input type="text" data-path="${path}" data-kind="string" value="${escapeAttr(cur ?? "")}" placeholder="${escapeAttr(f.placeholder ?? "")}">`);
    case "int":
      return wrap(`<input type="number" step="1" data-path="${path}" data-kind="int" value="${cur ?? ""}">`);
    case "float":
      return wrap(`<input type="number" step="any" data-path="${path}" data-kind="float" value="${fmtNum(cur)}">`);
    case "bool": {
      const checked = cur ? "checked" : "";
      return `<div class="field ${span} toggle-row">
        <div class="toggle-info"><div class="field-label">${escapeAttr(f.label)} ${tip(f.tip)}</div></div>
        <label class="toggle"><input type="checkbox" data-path="${path}" data-kind="bool" ${checked}><span class="slider"></span></label>
      </div>`;
    }
    case "enum": {
      const opts = f.options.map(o => `<option value="${escapeAttr(o)}" ${o === cur ? "selected" : ""}>${escapeAttr(o)}</option>`).join("");
      return wrap(`<select data-path="${path}" data-kind="enum">${opts}</select>`);
    }
    case "tuple2": {
      const a = Array.isArray(cur) ? cur[0] : null, b = Array.isArray(cur) ? cur[1] : null;
      return wrap(`<div class="tuple">
        <input type="number" step="any" data-path="${path}" data-kind="tuple2" data-idx="0" value="${fmtNum(a)}" placeholder="mean">
        <input type="number" step="any" data-path="${path}" data-kind="tuple2" data-idx="1" value="${fmtNum(b)}" placeholder="std">
      </div>`);
    }
    case "nullable_string":
      return wrap(`<input type="text" data-path="${path}" data-kind="nullable_string" value="${escapeAttr(cur ?? "")}" placeholder="${escapeAttr(f.placeholder ?? "leave empty for default")}">`);
    case "nullable_int":
      return wrap(`<input type="number" step="1" data-path="${path}" data-kind="nullable_int" value="${cur ?? ""}" placeholder="${escapeAttr(f.placeholder ?? "leave empty for auto")}">`);
    case "nullable_float":
      return wrap(`<input type="number" step="any" data-path="${path}" data-kind="nullable_float" value="${fmtNum(cur)}" placeholder="${escapeAttr(f.placeholder ?? "leave empty for auto")}">`);
    case "nullable_tuple2": {
      const isOff = cur === null || cur === undefined;
      const a = Array.isArray(cur) ? cur[0] : null, b = Array.isArray(cur) ? cur[1] : null;
      const offLabel = f.offLabel ?? "disabled";
      return `<div class="field ${span}">
        <div class="field-label">${escapeAttr(f.label)} ${tip(f.tip)}
          <label class="inline-toggle ${isOff ? "" : "on"}" style="margin-left:auto;font-size:10.5px;padding:0 8px;height:18px"><input type="checkbox" data-path="${path}" data-kind="enable_toggle" ${isOff ? "" : "checked"}>${isOff ? "off" : "on"}</label>
        </div>
        ${isOff
          ? `<div class="muted" style="margin-top:4px">${escapeAttr(offLabel)}</div>`
          : `<div class="field-control"><div class="tuple">
              <input type="number" step="any" data-path="${path}" data-kind="nullable_tuple2" data-idx="0" value="${fmtNum(a)}" placeholder="mean">
              <input type="number" step="any" data-path="${path}" data-kind="nullable_tuple2" data-idx="1" value="${fmtNum(b)}" placeholder="std">
            </div></div>`}
      </div>`;
    }
    case "auto_or_float": {
      const isAuto = cur === "auto";
      return wrap(`<input type="number" step="any" data-path="${path}" data-kind="auto_or_float" value="${isAuto ? "" : fmtNum(cur)}" ${isAuto ? "disabled" : ""}>
        <label class="inline-toggle ${isAuto ? "on" : ""}"><input type="checkbox" data-path="${path}" data-kind="auto_toggle" ${isAuto ? "checked" : ""}>auto</label>`);
    }
    case "corner_params": {
      let mode, listText;
      if (cur === null || cur === undefined) { mode = "auto"; listText = ""; }
      else if (cur === "all") { mode = "all"; listText = ""; }
      else { mode = "custom"; listText = Array.isArray(cur) ? cur.join("\n") : String(cur); }
      const sel = (v) => mode === v ? "selected" : "";
      return wrap(`<div style="display:flex;flex-direction:column;gap:6px;width:100%">
        <select data-path="${path}" data-kind="corner_mode">
          <option value="auto" ${sel("auto")}>auto (let pipeline decide)</option>
          <option value="all" ${sel("all")}>all parameters</option>
          <option value="custom" ${sel("custom")}>custom list</option>
        </select>
        ${mode === "custom" ? `<textarea data-path="${path}" data-kind="corner_list" placeholder="One parameter name per line, e.g. lens_theta_E">${escapeAttr(listText)}</textarea>` : ""}
      </div>`);
    }
    case "picker": {
      const opts = f.options.map(o =>
        `<label class="pick ${o.value === cur ? "on" : ""}">
          <input type="radio" name="${path}" data-path="${path}" data-kind="picker" value="${escapeAttr(o.value)}" ${o.value === cur ? "checked" : ""}>
          <div class="pick-title">${escapeAttr(o.title)}</div>
          <div class="pick-desc">${escapeAttr(o.desc)}</div>
        </label>`
      ).join("");
      return `<div class="field span-2">${labelHtml}<div class="picker">${opts}</div></div>`;
    }
    default: return wrap(`<em>unsupported: ${f.type}</em>`);
  }
}

/* ─── Custom card kinds for the wizard ─── */

function renderPhaseCards(paths) {
  // Three big toggle cards for run_psf / run_multistart / run_sampling
  return `<div class="picker">${paths.map(p => {
    const f = F[p];
    const cur = getPath(STATE, p);
    const desc = (f.rich && f.rich.desc) || f.tip || "";
    return `<label class="pick ${cur ? "on" : ""}" style="display:flex;flex-direction:column;gap:4px;cursor:pointer">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
        <div class="pick-title">${escapeAttr(f.label)}</div>
        <span class="toggle"><input type="checkbox" data-path="${p}" data-kind="bool" ${cur ? "checked" : ""}><span class="slider"></span></span>
      </div>
      <div class="pick-desc">${escapeAttr(desc)}</div>
    </label>`;
  }).join("")}</div>`;
}

function renderSourceModePicker(card) {
  const st = STATE.model.source_type;
  const staged = STATE.model.corr_field_for_sampling_only;
  let mode;
  if (st === "shapelets") mode = "shapelets";
  else if (st === "corr_field" && staged) mode = "staged";
  else mode = "corr_field";

  const opts = [
    { value: "shapelets",  title: "Shapelets",
      desc: "Smooth basis-function expansion used for both gradient descent and sampling. Compact parameter count." },
    { value: "corr_field", title: "Correlated field",
      desc: "Pixelated GP-prior source (NIFTy) used for both gradient descent and sampling. Flexible but heavier." },
    { value: "staged",     title: "Staged (Shapelets → Corr-field)",
      desc: "Shapelets during gradient descent, correlated field during sampling. Fastest MAP convergence + flexible posterior." },
  ];

  const optsHtml = opts.map(o => `<label class="pick ${o.value === mode ? "on" : ""}">
    <input type="radio" name="source_mode" data-path="model.source_type" data-kind="source_mode" value="${o.value}" ${o.value === mode ? "checked" : ""}>
    <div class="pick-title">${escapeAttr(o.title)}</div>
    <div class="pick-desc">${escapeAttr(o.desc)}</div>
  </label>`).join("");

  return `<div class="card">
    <div class="card-title">${escapeAttr(card.title || "Source model")} ${tip("Shapelets, correlated field, or staged: shapelets for gradient descent then correlated field for sampling.")}</div>
    <div class="picker">${optsHtml}</div>
  </div>`;
}

function renderSkipNotice(card) {
  return `<div class="card" style="background:var(--surface-soft);border-style:dashed">
    <div class="card-title" style="color:var(--accent)">${escapeAttr(card.title)}</div>
    <div class="card-desc" style="margin-bottom:0">${escapeAttr(card.body)}</div>
  </div>`;
}

function renderPickerCard(card) {
  const path = card.path;
  const f = F[path];
  const cur = getPath(STATE, path);
  const opts = f.options.map(o =>
    `<label class="pick ${o.value === cur ? "on" : ""}">
      <input type="radio" name="${path}" data-path="${path}" data-kind="picker" value="${escapeAttr(o.value)}" ${o.value === cur ? "checked" : ""}>
      <div class="pick-title">${escapeAttr(o.title)}</div>
      <div class="pick-desc">${escapeAttr(o.desc)}</div>
    </label>`
  ).join("");
  const title = card.title || f.label;
  return `<div class="card">
    <div class="card-title">${escapeAttr(title)} ${tip(f.tip)}</div>
    <div class="picker">${opts}</div>
  </div>`;
}

function renderCard(card) {
  if (card.showIf && !card.showIf(STATE)) return "";

  if (card.kind === "phaseCards") {
    return `<div class="card">
      <div class="card-title">Stages to run</div>
      ${renderPhaseCards(card.paths)}
    </div>`;
  }
  if (card.kind === "pickerCard") return renderPickerCard(card);
  if (card.kind === "sourceModePicker") return renderSourceModePicker(card);
  if (card.kind === "skipNotice") return renderSkipNotice(card);
  if (card.kind === "summary")    return renderSummaryCard();
  if (card.kind === "tutorial")   return renderTutorial();
  if (card.kind === "downloadCta")return renderDownloadCta();

  // standard fields card
  const items = (card.fields || []).map(item => {
    const path = typeof item === "string" ? item : item.path;
    const override = typeof item === "string" ? null : item;
    if (override?.showIf && !override.showIf(STATE)) return "";
    if (!F[path]) return `<div class="muted">missing schema entry: ${path}</div>`;
    return renderField(path, override);
  }).filter(Boolean);

  if (items.length === 0) return "";

  // separate boolean toggles into a list (no grid) for nicer layout
  const allBools = items.every(html => html.includes('class="field span-2 toggle-row"') || html.includes('class="field  toggle-row"') || html.includes('toggle-row'));
  return `<div class="card">
    ${card.title ? `<div class="card-title">${escapeAttr(card.title)}</div>` : ""}
    ${card.desc ? `<div class="card-desc">${escapeAttr(card.desc)}</div>` : ""}
    <div class="${allBools ? "" : "grid"}">${items.join("")}</div>
  </div>`;
}

function renderSummaryCard() {
  const s = STATE;
  let sourceMode = "shapelets";
  if (s.model.source_type === "corr_field" && s.model.corr_field_for_sampling_only) sourceMode = "staged (shapelets → corr-field)";
  else if (s.model.source_type === "corr_field") sourceMode = "corr_field";

  let msInit = "";
  if (!s.run_multistart) {
    msInit = s.resume_from_previous
      ? `skipped, seeding sampling from ${s.resume_multistart_path || "output_dir/multistart/"}`
      : "skipped, seeding sampling from prior means";
  } else {
    msInit = "fresh multistart";
  }

  const rows = [
    ["Stages", [s.run_psf && "PSF", s.run_multistart && "Multistart", s.run_sampling && "Sampling"].filter(Boolean).join(" → ") || "(none)"],
    ["Output dir", s.output_dir],
    ["Source model", sourceMode],
    ["Lens light", s.model.use_double_sersic_lens ? "double Sersic" : "single Sersic"],
    ["Time delays", s.likelihood.use_time_delays ? "yes" : "no"],
    ["Ray-shoot consistency", s.likelihood.use_rayshoot_consistency ? "yes" : "no"],
    ["Multistart init", msInit],
    ["Sampler backend", s.run_sampling ? s.sampler.sampler + (s.sampler.sampler === "nifty" ? ` (${s.sampler.nifty_mode})` : "") : "(skipped)"],
    ["Plots saved", s.plotting.save_plots ? `${s.plotting.plot_format.toUpperCase()} @ ${s.plotting.dpi} DPI` : "no"],
  ];
  return `<div class="summary">
    ${rows.map(([k,v]) => `<div class="summary-row"><div class="summary-key">${escapeAttr(k)}</div><div class="summary-val">${escapeAttr(v)}</div></div>`).join("")}
  </div>`;
}

function copyCode(btn) {
  const text = btn.dataset.code;
  navigator.clipboard.writeText(text).then(
    () => { const o = btn.textContent; btn.textContent = "Copied"; setTimeout(() => btn.textContent = o, 1400); },
    () => toast("Couldn't copy to clipboard", "error")
  );
}

/* ─── Step rendering ─── */

function visibleSteps() {
  return STEPS.filter(s => !s.showIf || s.showIf(STATE));
}

function clampStep() {
  const vs = visibleSteps();
  if (CURRENT_STEP >= vs.length) CURRENT_STEP = vs.length - 1;
  if (CURRENT_STEP < 0) CURRENT_STEP = 0;
}

function renderStep(step) {
  const cardsHtml = (step.cards || []).map(renderCard).filter(Boolean).join("");

  // Advanced section
  let advHtml = "";
  if (step.advanced && (!step.advanced.showIf || step.advanced.showIf(STATE))) {
    const advCards = (step.advanced.cards || []).map(renderCard).filter(Boolean).join("");
    if (advCards) {
      advHtml = `<details class="advanced">
        <summary>Advanced:${escapeAttr(step.advanced.label)}</summary>
        <div class="advanced-body">${advCards}</div>
      </details>`;
    }
  }

  return `<div class="step-fade">
    <div class="step-hero">
      <div class="step-hero-mark">${escapeAttr(step.icon)}</div>
      <div class="step-hero-text">
        <div class="step-eyebrow">${escapeAttr(step.eyebrow)}</div>
        <div class="step-title">${escapeAttr(step.title)}</div>
        <div class="step-intro">${escapeAttr(step.intro)}</div>
      </div>
    </div>
    ${cardsHtml}
    ${advHtml}
  </div>`;
}

function renderProgress() {
  const vs = visibleSteps();
  const parts = [];
  vs.forEach((s, i) => {
    const cls = i === CURRENT_STEP ? "active" : (i < CURRENT_STEP ? "done" : "upcoming");
    parts.push(`<div class="progress-step ${cls}" data-idx="${i}">
      <div class="dot">${escapeAttr(s.icon)}</div>
      <div class="lbl">${escapeAttr(s.title.length > 24 ? s.title.slice(0,22)+"…" : s.title)}</div>
    </div>`);
    if (i < vs.length - 1) {
      parts.push(`<div class="progress-line ${i < CURRENT_STEP ? "done" : ""}"></div>`);
    }
  });
  return parts.join("");
}

function render() {
  clampStep();
  const vs = visibleSteps();
  const step = vs[CURRENT_STEP];
  document.getElementById("progress").innerHTML = renderProgress();
  document.getElementById("stage").innerHTML = renderStep(step);
  document.getElementById("stepCounter").textContent = `${CURRENT_STEP + 1} / ${vs.length}`;
  document.getElementById("navBack").disabled = CURRENT_STEP === 0;
  const lastStep = CURRENT_STEP === vs.length - 1;
  document.getElementById("navNext").innerHTML = lastStep ? "Done" : "Next →";
  document.getElementById("navNext").disabled = false;
  bindAll();
  updatePreview();
  // attach progress nav click handlers (only to done/active dots)
  document.querySelectorAll(".progress-step").forEach(el => {
    const idx = parseInt(el.dataset.idx, 10);
    if (idx <= CURRENT_STEP) {
      el.onclick = () => { CURRENT_STEP = idx; render(); window.scrollTo({top:0, behavior:"smooth"}); };
    }
  });
}

/* =========================================================================
   BINDINGS: input → STATE
   ========================================================================= */

function bindAll() {
  document.querySelectorAll("[data-path][data-kind]").forEach(el => {
    const path = el.dataset.path;
    const kind = el.dataset.kind;

    const handler = () => {
      switch (kind) {
        case "string": setPath(STATE, path, el.value); break;
        case "int": {
          if (el.value === "") { setPath(STATE, path, null); break; }
          const v = parseInt(el.value, 10);
          setPath(STATE, path, isFinite(v) ? v : null); break;
        }
        case "float": setPath(STATE, path, parseNum(el.value)); break;
        case "bool":
          setPath(STATE, path, el.checked);
          render(); return;     // bools may toggle visibility - full re-render
        case "enum":
          setPath(STATE, path, el.value);
          render(); return;
        case "picker":
          setPath(STATE, path, el.value);
          render(); return;
        case "source_mode": {
          const m = el.value;
          if (m === "shapelets") {
            STATE.model.source_type = "shapelets";
            STATE.model.corr_field_for_sampling_only = false;
          } else if (m === "corr_field") {
            STATE.model.source_type = "corr_field";
            STATE.model.corr_field_for_sampling_only = false;
          } else if (m === "staged") {
            STATE.model.source_type = "corr_field";
            STATE.model.corr_field_for_sampling_only = true;
          }
          render(); return;
        }
        case "tuple2": {
          const cur = Array.isArray(getPath(STATE, path)) ? getPath(STATE, path) : [null,null];
          cur[parseInt(el.dataset.idx,10)] = parseNum(el.value);
          setPath(STATE, path, cur); break;
        }
        case "nullable_string":
          setPath(STATE, path, el.value.trim() === "" ? null : el.value); break;
        case "nullable_int":
          setPath(STATE, path, el.value === "" ? null : (isFinite(parseInt(el.value,10)) ? parseInt(el.value,10) : null)); break;
        case "nullable_float":
          setPath(STATE, path, el.value === "" ? null : parseNum(el.value)); break;
        case "nullable_tuple2": {
          const cur = Array.isArray(getPath(STATE, path)) ? getPath(STATE, path) : [0,0];
          cur[parseInt(el.dataset.idx,10)] = el.value === "" ? 0 : parseNum(el.value);
          setPath(STATE, path, cur); break;
        }
        case "enable_toggle":
          setPath(STATE, path, el.checked ? [0,0] : null);
          render(); return;
        case "auto_or_float":
          setPath(STATE, path, parseNum(el.value)); break;
        case "auto_toggle":
          setPath(STATE, path, el.checked ? "auto" : 0);
          render(); return;
        case "corner_mode": {
          const m = el.value;
          if (m === "auto") setPath(STATE, path, null);
          else if (m === "all") setPath(STATE, path, "all");
          else setPath(STATE, path, []);
          render(); return;
        }
        case "corner_list": {
          const lines = el.value.split("\n").map(s => s.trim()).filter(Boolean);
          setPath(STATE, path, lines); break;
        }
      }
      updatePreview();
    };

    el.addEventListener("input", handler);
    el.addEventListener("change", handler);
  });
}

/* =========================================================================
   JSON preview
   ========================================================================= */

function syntaxHighlight(json) {
  json = json.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  return json.replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d*)?([eE][+\-]?\d+)?)/g,
    (m) => {
      let cls = "number";
      if (/^"/.test(m)) cls = /:$/.test(m) ? "key" : "string";
      else if (/true|false/.test(m)) cls = "bool";
      else if (/null/.test(m)) cls = "null";
      return `<span class="${cls}">${m}</span>`;
    }
  );
}

function updatePreview() {
  document.getElementById("jsonPreview").innerHTML = syntaxHighlight(JSON.stringify(STATE, null, 2));
}

function togglePreview() {
  document.getElementById("previewDrawer").classList.toggle("open");
}

/* =========================================================================
   Nav
   ========================================================================= */

document.getElementById("navBack").onclick = () => {
  if (CURRENT_STEP > 0) { CURRENT_STEP--; render(); window.scrollTo({top:0, behavior:"smooth"}); }
};
document.getElementById("navNext").onclick = () => {
  const vs = visibleSteps();
  if (CURRENT_STEP < vs.length - 1) { CURRENT_STEP++; render(); window.scrollTo({top:0, behavior:"smooth"}); }
  else { downloadConfig(); }
};

/* =========================================================================
   Download / load / reset
   ========================================================================= */

function downloadConfig() {
  const blob = new Blob([JSON.stringify(STATE, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "config.json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast("config.json downloaded", "success");
}

function resetDefaults() {
  if (!confirm("Reset all fields to defaults? Unsaved changes will be lost.")) return;
  STATE = getDefaults();
  CURRENT_STEP = 0;
  render();
  toast("Reset to defaults", "success");
}

function loadJSON(text) {
  try {
    const parsed = JSON.parse(text);
    const fresh = getDefaults();
    deepMerge(fresh, parsed);
    STATE = fresh;
    CURRENT_STEP = 0;
    render();
    toast("Loaded config.json", "success");
  } catch (e) {
    toast("Invalid JSON: " + e.message, "error");
  }
}

function deepMerge(target, source) {
  if (source === null || typeof source !== "object" || Array.isArray(source)) return source;
  for (const k in source) {
    if (source[k] !== null && typeof source[k] === "object" && !Array.isArray(source[k])
        && target[k] !== null && typeof target[k] === "object" && !Array.isArray(target[k])) {
      deepMerge(target[k], source[k]);
    } else {
      target[k] = source[k];
    }
  }
  return target;
}

document.getElementById("fileInput").addEventListener("change", (e) => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => loadJSON(ev.target.result);
  r.readAsText(f);
  e.target.value = "";
});

/* toast */
let toastTimer;
function toast(msg, kind) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show " + (kind || "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = "toast"; }, 2200);
}

/* init */
render();
</script>
</body>
</html>
