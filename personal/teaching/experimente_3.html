<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ohmsches Gesetz – Konstantandraht‑Simulation</title>
    <style>
        :root {
            --bg: #fdfdfd;
            --primary: #0077ff;
            --meter-bg: #111;
            --meter-fg: #0f0;
            --border: #ccc;
            --radius: 12px;
        }
        body {
            background: var(--bg);
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            color: #222;
        }
        h1 {
            margin-bottom: 1rem;
            text-align: center;
        }
        .panel {
            max-width: 520px;
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            background: white;
        }
        .slider {
            width: 100%;
        }
        .readout {
            font-size: 1.25rem;
            font-weight: bold;
            margin-left: 0.5rem;
        }
        .meter {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 0.5rem 1rem;
            margin-top: 1rem;
            background: var(--meter-bg);
            color: var(--meter-fg);
            border-radius: var(--radius);
            font-family: 'Courier New', monospace;
        }
        .meter .label {
            color: #fff;
            margin-right: 0.5rem;
        }
        svg.diagram {
            max-width: 100%;
            margin-top: 1.5rem;
        }
        footer {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #555;
        }
    </style>
</head>
<body>
<h1>Simulation: Ohmsches Gesetz mit Konstantandraht</h1>
<div class="panel">
    <label for="voltage">Batteriespannung (0–15&nbsp;V):</label>
    <input id="voltage" class="slider" type="range" min="0" max="15" step="0.1" value="0" />
    <span id="voltageRead" class="readout">0.0&nbsp;V</span>

    <div class="meter"><span class="label">A</span><span id="ammeter">0.00&nbsp;A</span></div>
    <div class="meter"><span class="label">V</span><span id="voltmeter">0.0&nbsp;V</span></div>

    <svg class="diagram" viewBox="0 0 420 180" xmlns="http://www.w3.org/2000/svg" aria-label="Schaltplan">
        <!-- Batterie -->
        <line x1="20" y1="90" x2="60" y2="90" stroke="#000" stroke-width="2" />
        <line x1="60" y1="70" x2="60" y2="110" stroke="#000" stroke-width="8" />
        <line x1="70" y1="75" x2="70" y2="105" stroke="#000" stroke-width="2" />
        <line x1="70" y1="90" x2="110" y2="90" stroke="#000" stroke-width="2" />

        <!-- Amperemeter -->
        <circle cx="140" cy="90" r="25" fill="none" stroke="#000" stroke-width="2" />
        <text x="140" y="95" text-anchor="middle" font-size="16" font-family="sans-serif">A</text>

        <!-- Widerstand -->
        <line x1="165" y1="90" x2="190" y2="70" stroke="#000" stroke-width="2" />
        <line x1="190" y1="70" x2="215" y2="110" stroke="#000" stroke-width="2" />
        <line x1="215" y1="110" x2="240" y2="70" stroke="#000" stroke-width="2" />
        <line x1="240" y1="70" x2="265" y2="110" stroke="#000" stroke-width="2" />
        <line x1="265" y1="110" x2="290" y2="90" stroke="#000" stroke-width="2" />

        <!-- Voltmeter-Paralleldraht -->
        <line x1="190" y1="40" x2="190" y2="70" stroke="#888" stroke-width="2" />
        <line x1="290" y1="40" x2="290" y2="90" stroke="#888" stroke-width="2" />

        <!-- Voltmeter -->
        <circle cx="240" cy="40" r="25" fill="none" stroke="#000" stroke-width="2" />
        <text x="240" y="45" text-anchor="middle" font-size="16" font-family="sans-serif">V</text>

        <!-- Rückleitung -->
        <line x1="290" y1="90" x2="330" y2="90" stroke="#000" stroke-width="2" />
        <line x1="330" y1="90" x2="330" y2="140" stroke="#000" stroke-width="2" />
        <line x1="330" y1="140" x2="20" y2="140" stroke="#000" stroke-width="2" />
        <line x1="20" y1="140" x2="20" y2="90" stroke="#000" stroke-width="2" />
    </svg>
</div>
<footer>
    Widerstandswert R&nbsp;=&nbsp;<span id="resValue">10</span>&nbsp;Ω (Konstantandraht)
</footer>
<script>
    const R = 10; // Ω – fixer Widerstandswert des Konstantandrahts
    const voltageSlider = document.getElementById('voltage');
    const voltageRead = document.getElementById('voltageRead');
    const ammeter = document.getElementById('ammeter');
    const voltmeter = document.getElementById('voltmeter');

    function update() {
        const V = parseFloat(voltageSlider.value);
        const I = V / R; // I = U / R
        voltageRead.textContent = V.toFixed(1) + ' V';
        ammeter.textContent = I.toFixed(2) + ' A';
        voltmeter.textContent = V.toFixed(1) + ' V';
    }

    voltageSlider.addEventListener('input', update);
    update(); // Initialer Aufruf
</script>
</body>
</html>
