<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6B8FBF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="WeatherConf">
    <meta name="color-scheme" content="light">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="apple-touch-icon.png">
    <title>WeatherConfidence</title>
    <link rel="stylesheet" href="style.css?v=3">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <h1 class="logo">Weather<span>Confidence</span></h1>
        </header>

        <div class="search-container">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                </svg>
                <input type="text" id="search-input" placeholder="Search location..." autocomplete="off">
                <button id="geo-btn" class="geo-btn" title="My Location">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4m10-10h-4M6 12H2"/>
                    </svg>
                </button>
            </div>
            <div id="search-results" class="search-results hidden"></div>
        </div>

        <div id="location-display" class="location-display"></div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <div id="error" class="error hidden"></div>

        <main id="main-content" class="main-content hidden">
            <section id="current-weather" class="current-weather-card"></section>
            <section id="confidence-section" class="confidence-section"></section>
            <section id="daily-forecast" class="daily-forecast"></section>

            <section class="chart-section">
                <h2 class="section-title">Temperature Ensemble</h2>
                <div class="chart-container">
                    <canvas id="ensemble-chart"></canvas>
                </div>
                <div class="chart-legend">
                    <span class="legend-item"><span class="legend-line"></span> Mean</span>
                    <span class="legend-item"><span class="legend-band inner"></span> &plusmn;1&sigma;</span>
                    <span class="legend-item"><span class="legend-band outer"></span> Min&ndash;Max</span>
                </div>
            </section>

            <section class="chart-section">
                <h2 class="section-title">Precipitation Ensemble</h2>
                <div class="chart-container">
                    <canvas id="precip-chart"></canvas>
                </div>
                <div class="chart-legend">
                    <span class="legend-item"><span class="legend-line precip"></span> Mean</span>
                    <span class="legend-item"><span class="legend-band inner precip"></span> &plusmn;1&sigma;</span>
                    <span class="legend-item"><span class="legend-band outer precip"></span> Min&ndash;Max</span>
                </div>
            </section>

            <section id="radar-section" class="radar-section hidden">
                <h2 class="section-title">Precipitation Radar</h2>
                <div class="radar-map-container">
                    <div id="radar-map"></div>
                </div>
                <div class="radar-controls">
                    <button id="radar-play" class="radar-play-btn" title="Play/Pause">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><polygon id="play-icon" points="6,4 20,12 6,20"/></svg>
                    </button>
                    <input type="range" id="radar-slider" class="radar-slider" min="0" max="0" value="0">
                    <span id="radar-time" class="radar-time">--:--</span>
                </div>
            </section>

            <section id="explanation-section" class="explanation-section"></section>

            <footer class="data-attribution">
                Data: <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a> &middot;
                Model: <a href="https://www.dwd.de/EN/research/weatherforecasting/num_modelling/01_num_weather_prediction_modells/icon_description.html" target="_blank" rel="noopener">DWD ICON</a> &middot;
                Radar: <a href="https://www.rainviewer.com/" target="_blank" rel="noopener">RainViewer</a>
            </footer>
        </main>
    </div>

    <!-- Day Detail Modal -->
    <div id="day-modal" class="day-modal hidden">
        <div class="day-modal-backdrop"></div>
        <div class="day-modal-sheet">
            <div class="day-modal-handle"></div>
            <div class="day-modal-header">
                <h2 id="day-modal-title" class="day-modal-title"></h2>
                <button id="day-modal-close" class="day-modal-close">&times;</button>
            </div>
            <div id="day-modal-stats" class="day-modal-stats"></div>
            <div class="day-modal-chart-wrap">
                <h3 class="day-modal-section-title">Temperature</h3>
                <div class="day-modal-chart-container">
                    <canvas id="day-temp-chart"></canvas>
                </div>
            </div>
            <div class="day-modal-chart-wrap">
                <h3 class="day-modal-section-title">Precipitation</h3>
                <div class="day-modal-chart-container">
                    <canvas id="day-precip-chart"></canvas>
                </div>
            </div>
            <div id="day-modal-confidence" class="day-modal-confidence-wrap"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js?v=5"></script>
</body>
</html>
